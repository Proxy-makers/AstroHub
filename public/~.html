<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroHub - Settings</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at bottom, #1a001f 0%, #000 100%);
      font-family: Arial, sans-serif;
      color: #e0d4ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 3rem;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 10px #a855f7, 0 0 30px #c084fc;
    }

    .setting {
      margin: 1rem 0;
      padding: 1rem 2rem;
      border: 2px solid #a855f7;
      border-radius: 8px;
      width: 60%;
      max-width: 500px;
      background: rgba(40, 0, 60, 0.4);
      box-shadow: 0 0 15px #6b21a8;
    }

    label {
      font-size: 1.2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    input[type="checkbox"], input[type="text"] {
      margin-right: 0.5rem;
    }

    .btn {
      margin-top: 1rem;
      padding: 0.8rem 1.5rem;
      border: 2px solid #a855f7;
      border-radius: 6px;
      background: transparent;
      color: #e0d4ff;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 0 5px #c084fc;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a855f7;
      color: #000;
      box-shadow: 0 0 20px #9b5de5, 0 0 40px #c084fc;
    }

    footer {
      margin-top: auto;
      padding: 1rem;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>⚙️ AstroHub Settings</h1>

  <div class="setting">
    <label>
      <input type="checkbox" id="toggleParticles" checked>
      Enable Particle Background
    </label>
  </div>

  <div class="setting">
    <label for="panicKey">Panic Key (default: \)</label>
    <input type="text" id="panicKey" maxlength="1" value="\">
    <small>Press this key to instantly hide AstroHub.</small>
  </div>

  <div class="setting">
    <button class="btn" onclick="openAboutBlank()">🚀 Launch AstroHub in about:blank</button>
  </div>

  <footer>
    &copy; 2025 AstroHub. All rights reserved.
  </footer>

  <script>
    // === SETTINGS LOGIC ===

    // Save / Load settings from localStorage
    const particleCheckbox = document.getElementById('toggleParticles');
    const panicKeyInput = document.getElementById('panicKey');

    // Load saved settings
    window.onload = () => {
      if (localStorage.getItem("particles") === "off") {
        particleCheckbox.checked = false;
      }
      panicKeyInput.value = localStorage.getItem("panicKey") || "\\";
    };

    // Save particle setting
    particleCheckbox.addEventListener("change", () => {
      localStorage.setItem("particles", particleCheckbox.checked ? "on" : "off");
      alert("Particles " + (particleCheckbox.checked ? "enabled" : "disabled") + " (reload to apply).");
    });

    // Save panic key
    panicKeyInput.addEventListener("input", () => {
      localStorage.setItem("panicKey", panicKeyInput.value || "\\");
    });

    // Panic Key Function
    document.addEventListener("keydown", (e) => {
      let panicKey = localStorage.getItem("panicKey") || "\\";
      if (e.key === panicKey) {
        window.location.href = "https://google.com"; // hides AstroHub fast
      }
    });

    // Open site in about:blank
    function openAboutBlank() {
      let newTab = window.open("about:blank", "_blank");
      let html = `
        <iframe src="${window.location.href}" style="width:100%;height:100%;border:none;"></iframe>
      `;
      newTab.document.write(html);
      newTab.document.close();
    }
  </script>
</body>
</html>
