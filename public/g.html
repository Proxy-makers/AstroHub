<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroHub - Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(ellipse at bottom, #0b001a 0%, #000 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      font-size: 2.5rem;
      font-weight: bold;
      color: #c77dff;
      text-shadow: 0 0 10px #c77dff, 0 0 20px #9d4edd;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 1rem;
    }

    .search-container {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .search-container input {
      width: 60%;
      max-width: 500px;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #1a001f;
      color: #fff;
      box-shadow: 0 0 10px #6a0dad;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      padding: 1rem 2rem 2rem;
      flex: 1;
    }

    a.game-card {
      text-decoration: none;  /* no underline */
      color: inherit;
    }

    .game-card {
      position: relative;
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      background: #111;
      transition: transform 0.2s;
      box-shadow: 0 0 8px rgba(155, 89, 182, 0.7);
      aspect-ratio: 1 / 1;  /* always square */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* keep square crop */
      display: block;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #c77dff, 0 0 30px #9d4edd;
    }

    .game-card .name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      text-align: center;
      font-size: 0.9rem;
      padding: 0.3rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .game-card:hover .name {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #777;
    }
  </style>
</head>
<body>
  <header>Games</header>
  <div class="subtitle">Showing all games</div>

  <div class="search-container">
    <input type="text" placeholder="Search games...">
  </div>

  <div class="games-grid">
    <a href="Games/1.html" class="game-card">
      <img src="Images/12.png" alt="1">
      <div class="name">1</div>
    </a>
    <a href="Games/1v1.lol.html" class="game-card">
      <img src="Images/1v1.png" alt="1v1.lol">
      <div class="name">1v1.lol</div>
    </a>
    <a href="Games/19mintildawn.html" class="game-card">
      <img src="Images/10mintilldawn.png" alt="10 Minutes Till Dawn">
      <div class="name">10 Minutes Till Dawn</div>
    </a>
    <a href="Games/2048.html" class="game-card">
      <img src="public/Images/2048.png" alt="2048">
      <div class="name">2048</div>
    </a>
  </div>

  <footer>&copy; 2025 AstroHub. All rights reserved.</footer>
</body>
</html>
