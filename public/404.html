<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - AstroHub</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at bottom, #1a001f 0%, #000 100%);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #e0d4ff;
      overflow: hidden;
    }

    canvas#particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 0 0 10px #a855f7, 0 0 30px #c084fc;
    }

    p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 5px #9b5de5;
    }

    .btn-back {
      padding: 1rem 2rem;
      border: 2px solid #a855f7;
      border-radius: 6px;
      background: transparent;
      color: #e0d4ff;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 0 5px #c084fc;
      transition: 0.3s;
    }

    .btn-back:hover {
      background: #a855f7;
      color: #000;
      box-shadow: 0 0 20px #9b5de5, 0 0 40px #c084fc;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <h1>404</h1>
  <p>Oops! Looks like you drifted off.</p>
  <button class="btn-back" onclick="goBack()">⬅ Go Back</button>

  <script>
    function goBack() {
      window.history.back();
    }

    // Particle animation
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random();
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      draw() {
        ctx.fillStyle = `rgba(168, 85, 247, ${this.alpha})`; /* purple */
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    initParticles();
    animate();
  </script>
</body>
</html>
